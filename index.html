    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {

        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef);
            border-radius: 20px;
        }

        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            background: radial-gradient(ellipse at 30% 40%, #1a1a3e 0%, #0a0a0f 50%, #000000 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #ffffff, rgba(255,255,255,0.3));
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
            will-change: opacity, transform;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
            will-change: transform;
        }

        .nebula-1 {
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, #6366f1, #8b5cf6);
            top: -20%;
            right: -15%;
            animation: nebulaFloat 20s ease-in-out infinite;
        }

        .nebula-2 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, #d946ef, #f43f5e);
            bottom: -15%;
            left: -20%;
            animation: nebulaFloat 25s ease-in-out infinite reverse;
        }

        .nebula-3 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #06b6d4, #3b82f6);
            top: 50%;
            left: 40%;
            animation: nebulaFloat 30s ease-in-out infinite;
        }

        @keyframes nebulaFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(3%, 4%) scale(1.05); }
            50% { transform: translate(-2%, 6%) scale(0.98); }
            75% { transform: translate(5%, -3%) scale(1.03); }
        }

            animation: cinematicReveal 1.2s ease;
        }

        @keyframes cinematicReveal {
            0% { opacity: 0; transform: translateY(60px) scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }

            background-clip: text;
            color: transparent;
            animation: titleShine 6s linear infinite;
            letter-spacing: -1.5px;

        { title: "Document Structure", time: "5 min", content: "Every HTML document follows a standard structure:<br><br><pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"en\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;title&gt;Page Title&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;h1&gt;Hello World!&lt;/h1&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre>" },
        { title: "HTML Headings", time: "4 min", content: "Headings create hierarchy in your content:<br><br><pre><code>&lt;h1&gt;Main Heading&lt;/h1&gt;\n&lt;h2&gt;Section Heading&lt;/h2&gt;\n&lt;h3&gt;Subsection&lt;/h3&gt;</code></pre><div class='tip-box'><strong>💡 SEO Tip:</strong> Use only one &lt;h1&gt; per page!</div>" }
    ];

    for (let i = 1; i <= 50; i++) {
        let content = '';

            content = `<h2>📚 Lesson ${i}: ${lessonData[i-1].title}</h2><br>${lessonData[i-1].content}`;

        { id: 1, name: "X (Twitter)", icon: "fa-brands fa-x-twitter", color: "#ffffff", desc: "Real-time social platform", status: "available" },

        { id: 3, name: "Spotify Premium", icon: "fa-brands fa-spotify", color: "#1DB954", desc: "Music streaming", status: "available" },
        { id: 4, name: "YouTube Studio", icon: "fa-brands fa-youtube", color: "#FF0000", desc: "Video platform", status: "available" },

    let currentPage = 'start';
    let isLoggedIn = false;
    let activeModule = 'learn';

        currentPage = 'dashboard';

    function generateCloneCode(clone) {
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${clone.name}</title><style>body{font-family:system-ui;background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0;padding:20px}.card{background:rgba(255,255,255,0.95);backdrop-filter:blur(30px);border-radius:40px;padding:60px;text-align:center;max-width:500px;box-shadow:0 40px 80px rgba(0,0,0,0.3)}h1{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:20px;font-size:2.5rem}p{color:#4a5568;margin-bottom:30px;line-height:1.8}.btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:16px 36px;border-radius:50px;cursor:pointer;font-weight:700;transition:all 0.3s}.btn:hover{transform:translateY(-3px)scale(1.05);box-shadow:0 25px 60px rgba(99,102,241,0.6)}</style></head><body><div class="card"><h1>✨ ${clone.name} ✨</h1><p>${clone.desc}</p><button class="btn" onclick="alert('🚀 Welcome!')">Launch →</button></div></body></html>`;

                    currentView = 'email';
                    render();
                }
            }, 1000);
        }
    }

    function saveEmailAndSend(event) {
        event.preventDefault();
        const email = document.getElementById('userEmail')?.value;
        
        if (email && email.includes('@') && email.includes('.')) {
            sendEmailToAdmin(email);
            markEmailAsShown();
            alert('✅ Thanks for subscribing! You will receive daily tips.');
            currentView = 'dashboard';
            render();

            alert('⚠️ Please enter a valid email address (example@email.com)');

    function skipEmailForever() {
        markEmailAsShown();
        currentView = 'dashboard';
        render();
    }

    function showComingSoon(itemName) {
        document.getElementById('comingSoonTitle').textContent = `✨ ${itemName} ✨`;
        document.getElementById('comingSoonItem').textContent = itemName;
        document.getElementById('comingSoonModal').classList.add('active');

        document.getElementById('comingSoonModal')?.classList.remove('active');

    function notifyMe() {
        alert('🎉 Thanks! You\'ll be notified when this launches! 🚀');
        closeComingSoonModal();

    function startHTMLLesson() {
        currentLessonPage = 1;
        currentView = 'lesson';
        render();

    function nextLesson() {
        if (currentLessonPage < 50) {
            currentLessonPage++;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function prevLesson() {
        if (currentLessonPage > 1) {
            currentLessonPage--;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function backToDashboard() {
        currentView = 'dashboard';
        render();
    }

    function showEmailSignup() {
        if (!isEmailAlreadyShown()) {
            currentView = 'email';
            render();
        } else {
            alert('You have already subscribed! Thank you 🙏');
        }
    }

    function render() {
        const root = document.getElementById('root');
        
        if (currentPage === 'start') {
            autoEmailTriggered = false;
            root.innerHTML = `
                <div class="start-page">
                    <div class="hero-content">
                        <span class="hero-badge"><i class="fas fa-crown"></i> ULTIMATE EDITION • 20+ PREMIUM CLONES <i class="fas fa-crown"></i></span>
                        <h1 class="hero-title">Master the Art of<br>Web Development</h1>
                        <p class="hero-subtitle">Premium clones • 50 comprehensive lessons • Live compiler<br>Daily email tips to keep you motivated!</p>
                        <div class="stats-row">
                            <div class="stat"><span class="stat-number">20+</span><span class="stat-label">Premium Clones</span></div>

                        </div>

            `;
        } else if (currentPage === 'login') {
            root.innerHTML = `
                <div class="login-page">
                    <div class="login-container">
                        <div class="login-header">
                            <div class="login-icon"><i class="fas fa-crown"></i></div>
                            <h2>Welcome Back</h2>

                        </div>
                        <div class="input-group">
                            <label class="input-label">Username</label>

                                <i class="fas fa-lock"></i>

            `;
        } else if (currentPage === 'dashboard' && isLoggedIn) {

                                <div class="progress-bar"><div class="progress-fill" style="width: ${(currentLessonPage/50)*100}%"></div></div>
                            </div>
                            <div class="lesson-content"><div class="lesson-text">${lesson.content}</div></div>
                            <div class="lesson-navigation">
                                <button class="nav-btn" onclick="prevLesson()" ${currentLessonPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Previous</button>

                                <span class="logo-text">CloneGPT Ultimate</span>

                                <p style="margin-top:1.5rem; color:#71717a; font-size:0.85rem;">
                                    <i class="fas fa-shield-alt"></i> We respect your privacy. No spam ever!
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                let topicsHtml = '';
                learningTopics.forEach(topic => {
                    if (topic.status === 'coming-soon') {
                        topicsHtml += `<div class="card disabled" onclick="showComingSoon('${topic.title}')"><div class="coming-soon-badge"><i class="fas fa-clock"></i> Coming Soon</div><div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-rocket"></i> Coming Q2 2026</span></div></div>`;
                    } else {
                        if (topic.id === 4) {
                            topicsHtml += `<div class="card" onclick="showEmailSignup()">${topic.isNew ? '<div class="new-badge"><i class="fas fa-star"></i> NEW</div>' : ''}<div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-envelope"></i> Subscribe Now</span></div></div>`;
                        } else {
                            topicsHtml += `<div class="card" onclick="startHTMLLesson()">${topic.isNew ? '<div class="new-badge"><i class="fas fa-star"></i> JUST RELEASED</div>' : ''}<div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-check-circle" style="color: #10b981;"></i> 50 Lessons Ready</span></div></div>`;
                        }
                    }
                });
                
                let clonesHtml = '';
                websiteClones.forEach(clone => {
                    clonesHtml += `<div class="card" onclick="showCloneModal(${clone.id})"><div class="card-icon"><i class="${clone.icon}" style="color: ${clone.color};"></i></div><div class="card-content"><h3>${clone.name}</h3><p>${clone.desc}</p><span class="card-tag"><i class="fas fa-bolt"></i> Ready to Deploy</span></div></div>`;
                });
                
                root.innerHTML = `
                    <div class="dashboard">
                        <nav class="navbar">
                            <div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CloneGPT Ultimate</span></div>
                            <button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
                        </nav>
                        <div class="tabs-wrapper">
                            <div class="tabs">
                                <button class="tab ${activeModule === 'learn' ? 'active' : ''}" onclick="switchModule('learn')"><i class="fas fa-graduation-cap"></i> Learning Hub</button>
                                <button class="tab ${activeModule === 'compiler' ? 'active' : ''}" onclick="switchModule('compiler')"><i class="fas fa-code"></i> Live Compiler</button>
                                <button class="tab ${activeModule === 'clones' ? 'active' : ''}" onclick="switchModule('clones')"><i class="fas fa-clone"></i> Premium Clones</button>
                            </div>
                        </div>
                        <div class="content-area">
                            <div id="learnSection" style="display: ${activeModule === 'learn' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-graduation-cap"></i> Mastery Path</h2><p>Begin with HTML • 50 comprehensive lessons to excellence</p></div>
                                <div class="cards-grid">${topicsHtml}</div>
                            </div>
                            <div id="compilerSection" style="display: ${activeModule === 'compiler' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-code"></i> Ultimate Code Compiler</h2><p>Write • Preview • Perfect</p></div>
                                <div class="compiler-container">
                                    <div class="compiler-tabs">
                                        <button class="compiler-tab active" onclick="switchCompilerTab('html', this)">HTML</button>
                                        <button class="compiler-tab" onclick="switchCompilerTab('css', this)">CSS</button>
                                        <button class="compiler-tab" onclick="switchCompilerTab('js', this)">JavaScript</button>
                                    </div>
                                    <div id="compilerHtml" class="compiler-panel active"><textarea id="htmlCode" class="code-textarea" placeholder="Write HTML here..."><div class="demo" style="text-align:center;padding:40px;"><h1>✨ Ultimate Compiler</h1><p>Create something extraordinary!</p><button id="demoBtn">Experience Magic</button></div></textarea></div>
                                    <div id="compilerCss" class="compiler-panel"><textarea id="cssCode" class="code-textarea" placeholder="Write CSS here...">body{font-family:system-ui;background:linear-gradient(135deg,#6366f1,#8b5cf6);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0}.demo{background:white;border-radius:30px;padding:50px;box-shadow:0 30px 60px rgba(0,0,0,0.3)}button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:14px 32px;border-radius:50px;cursor:pointer;margin-top:20px;font-weight:700;transition:all 0.3s}button:hover{transform:scale(1.05);box-shadow:0 15px 40px rgba(99,102,241,0.4)}</textarea></div>
                                    <div id="compilerJs" class="compiler-panel"><textarea id="jsCode" class="code-textarea" placeholder="Write JavaScript here...">document.getElementById('demoBtn').onclick=function(){alert('🚀 Welcome to CloneGPT Ultimate!')};</textarea></div>
                                    <button class="run-button" onclick="runCompiler()"><i class="fas fa-play"></i> Run Code</button>
                                    <iframe id="previewFrame" class="preview-frame"></iframe>
                                </div>
                            </div>
                            <div id="clonesSection" style="display: ${activeModule === 'clones' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-crown"></i> Premium Clone Collection</h2><p>${websiteClones.length} professional-grade clones • Click to explore</p></div>
                                <div class="cards-grid">${clonesHtml}</div>
                            </div>
                        </div>
                    </div>
                    <div id="globalModal" class="modal">
                        <div class="modal-window">
                            <div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                            <div class="modal-body">
                                <div class="modal-actions">
                                    <button class="modal-btn modal-btn-run" onclick="runModalPreview()"><i class="fas fa-play"></i> Live Preview</button>
                                    <button class="modal-btn modal-btn-copy" onclick="copyModalCode()"><i class="fas fa-copy"></i> Copy Code</button>
                                </div>
                                <pre id="modalCodeBlock" class="code-block"></pre>
                                <div id="modalPreviewContainer" class="preview-block"></div>
                            </div>
                        </div>
                    </div>
                    <div id="comingSoonModal" class="modal coming-soon-modal">
                        <div class="modal-window">
                            <div class="modal-header"><h3><i class="fas fa-rocket"></i> Coming Soon</h3><button class="modal-close" onclick="closeComingSoonModal()"><i class="fas fa-times"></i></button></div>
                            <div class="modal-body" style="text-align: center;">
                                <div class="coming-soon-icon">🚀</div>
                                <h2 class="coming-soon-title" id="comingSoonTitle"></h2>
                                <p class="coming-soon-text">We're crafting something extraordinary: <strong id="comingSoonItem"></strong></p>
                                <div class="coming-soon-progress"><div class="coming-soon-progress-bar"></div></div>
                                <p style="color: #a1a1aa; margin-bottom: 2rem;">Launching soon with premium features!</p>
                                <button class="notify-btn" onclick="notifyMe()"><i class="fas fa-bell"></i> Get Early Access</button>
                            </div>
                        </div>
                    </div>
                `;
                setTimeout(() => { 
                    if (activeModule === 'compiler') runCompiler(); 
                }, 100);
                
                showAutoEmailSignup();
            }
        }
    }

    window.goToLogin = () => { currentPage = 'login'; render(); };
    
    window.handleLogin = () => { 
        isLoggedIn = true; 
        currentPage = 'dashboard'; 
        currentView = 'dashboard'; 
        activeModule = 'learn'; 
        autoEmailTriggered = false;
        localStorage.setItem('clonegpt_ultimate_logged_in', 'true'); 
        render(); 
    };
    
    window.logout = () => { 
        isLoggedIn = false; 
        currentPage = 'start'; 
        autoEmailTriggered = false;
        localStorage.removeItem('clonegpt_ultimate_logged_in'); 
        render(); 
    };
    
    window.switchModule = (module) => { activeModule = module; currentView = 'dashboard'; render(); };
    
    window.switchCompilerTab = (type, btn) => {
        document.querySelectorAll('.compiler-tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        ['Html', 'Css', 'Js'].forEach(t => document.getElementById(`compiler${t}`)?.classList.remove('active'));
        document.getElementById(`compiler${type.charAt(0).toUpperCase() + type.slice(1)}`)?.classList.add('active');
    };
    
    window.runCompiler = () => {
        const html = document.getElementById('htmlCode')?.value || '';
        const css = document.getElementById('cssCode')?.value || '';
        const js = document.getElementById('jsCode')?.value || '';
        document.getElementById('previewFrame').srcdoc = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
    };
    
    window.showCloneModal = (cloneId) => {
        const clone = websiteClones.find(c => c.id === cloneId);
        currentModalCode = generateCloneCode(clone);
        document.getElementById('modalTitle').innerHTML = `<i class="${clone.icon}"></i> ${clone.name} Ultimate`;
        document.getElementById('modalCodeBlock').textContent = currentModalCode;
        document.getElementById('modalPreviewContainer').innerHTML = '';
        document.getElementById('globalModal').classList.add('active');
    };
    
    window.runModalPreview = () => {
        const iframe = document.createElement('iframe');
        iframe.className = 'preview-iframe';
        iframe.srcdoc = currentModalCode;
        const container = document.getElementById('modalPreviewContainer');
        container.innerHTML = '';
        container.appendChild(iframe);
    };
    
    window.copyModalCode = async () => {
        try { await navigator.clipboard.writeText(currentModalCode); alert('✅ Code copied!'); }
        catch { alert('📋 Copy manually (Ctrl+C)'); }
    };
    
    window.closeModal = () => document.getElementById('globalModal')?.classList.remove('active');
    
    window.saveEmailAndSend = saveEmailAndSend;
    window.skipEmailForever = skipEmailForever;
    window.showEmailSignup = showEmailSignup;

    if (checkAutoLogin() && !isEmailAlreadyShown()) {
        setTimeout(() => {
            if (currentPage === 'dashboard' && isLoggedIn && currentView === 'dashboard') {
                showAutoEmailSignup();
            }
        }, 500);
    }

    render();
</script>
</body>
</html>
