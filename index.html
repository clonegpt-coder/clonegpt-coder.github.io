</head>
<body>
<div class="universe"></div>
<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>
<div id="root"></div>

<!-- Certificate View Modal -->
<div id="certificateViewModal" class="modal">
    <div class="modal-window">
        <div class="modal-header">
            <h3><i class="fas fa-certificate"></i> 🎓 Your Certificate</h3>
            <button class="modal-close" onclick="closeCertificateViewModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <!-- ✅ YAHAN AAPKI IMAGE SHOW HOGI (JO REPO MEIN HAI) ✅ -->
            <img id="certificateImage" class="certificate-img" src="ChatGPT Image Jun 8, 2026, 02_50_02 AM.png" alt="Certificate">
            <div class="modal-actions">
                <button class="modal-btn modal-btn-download" onclick="downloadCertificate()"><i class="fas fa-download"></i> Download Certificate</button>
                <button class="modal-btn modal-btn-print" onclick="printCertificate()"><i class="fas fa-print"></i> Print Certificate</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Create stars
    function createStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 4 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }
    }
    createStars();

    // Certificate System
    let certificates = JSON.parse(localStorage.getItem('clonegpt_certificates')) || [];
    let currentViewingCertificate = null;
    let certificateTabVisible = false;

    function issueCertificate(courseId, courseName, lessonsCompleted) {
        const studentName = localStorage.getItem('student_name') || 'Elite Developer';
        
        const alreadyHasCert = certificates.some(c => c.courseId === courseId);
        
        if (!alreadyHasCert) {
            const certificate = {
                id: Date.now(),
                courseId: courseId,
                courseName: courseName,
                studentName: studentName,
                completionDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                lessonsCompleted: lessonsCompleted
            };
            certificates.push(certificate);
            localStorage.setItem('clonegpt_certificates', JSON.stringify(certificates));
            return certificate;
        }
        return null;
    }

    function showCertificatePopup(certificate) {
        const modal = document.getElementById('certificateViewModal');
        const img = document.getElementById('certificateImage');
        
        // Reset image src to ensure it loads
        img.src = "ChatGPT Image Jun 8, 2026, 02_50_02 AM.png";
        
        currentViewingCertificate = certificate;
        modal.classList.add('active');
    }

    function closeCertificateViewModal() {
        document.getElementById('certificateViewModal').classList.remove('active');
        currentViewingCertificate = null;
    }

    function downloadCertificate() {
        const img = document.getElementById('certificateImage');
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth || 800;
        canvas.height = img.naturalHeight || 600;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = `CloneGPT_Certificate.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    function printCertificate() {
        const imgSrc = document.getElementById('certificateImage').src;
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
            <head>
                <title>CloneGPT Certificate</title>
                <style>
                    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
                    img { max-width: 100%; height: auto; }
                    @media print { body { margin: 0; padding: 0; } }
                </style>
            </head>
            <body><img src="${imgSrc}" alt="Certificate"></body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    function checkAndIssueHTMLCertificate() {
        const htmlCompleted = localStorage.getItem('html_course_completed') === 'true';
        const currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        
        if (currentLessonPage === 50 && !htmlCompleted) {
            localStorage.setItem('html_course_completed', 'true');
            const certificate = issueCertificate('html_mastery', 'HTML Mastery Course', 50);
            
            if (certificate) {
                certificateTabVisible = true;
                const certTab = document.getElementById('certificatesTab');
                if (certTab) certTab.classList.remove('hidden-tab');
                
                setTimeout(() => {
                    showCertificatePopup(certificate);
                }, 500);
                return true;
            }
        }
        return false;
    }

    // HTML Lessons Data
    const htmlLessons = [];
    const lessonData = [
        { title: "Introduction to HTML", time: "5 min", content: "Welcome to HTML! HTML (HyperText Markup Language) is the standard language for creating web pages.<br><br><strong>Key Concepts:</strong><ul><li>HTML is a markup language</li><li>HTML documents are plain text files</li><li>HTML tags are not case-sensitive</li></ul><div class='tip-box'><strong>💡 Pro Tip:</strong> Think of HTML as the skeleton of your website!</div>" },
        { title: "Document Structure", time: "5 min", content: "Every HTML document follows a standard structure:<br><br><pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"en\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;title&gt;Page Title&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;h1&gt;Hello World!&lt;/h1&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre>" },
        { title: "HTML Headings", time: "4 min", content: "Headings create hierarchy in your content:<br><br><pre><code>&lt;h1&gt;Main Heading&lt;/h1&gt;\n&lt;h2&gt;Section Heading&lt;/h2&gt;\n&lt;h3&gt;Subsection&lt;/h3&gt;</code></pre><div class='tip-box'><strong>💡 SEO Tip:</strong> Use only one &lt;h1&gt; per page!</div>" }
    ];

    for (let i = 1; i <= 50; i++) {
        let content = '';
        let time = '5 min';
        if (i <= 3) {
            content = `<h2>📚 Lesson ${i}: ${lessonData[i-1].title}</h2><br>${lessonData[i-1].content}`;
            time = lessonData[i-1].time;
        } else {
            const topics = ["Paragraphs", "Links", "Images", "Lists", "Tables", "Forms", "Semantic HTML", "Div & Span", "Classes & IDs", "Iframes", "Audio/Video", "Responsive Design"];
            const topic = topics[(i - 4) % topics.length];
            content = `<h2>🚀 Lesson ${i}: ${topic}</h2><br><p>Mastering <strong>${topic}</strong> is essential for professional web development.</p><br><div class='tip-box'><strong>💡 Pro Tip:</strong> Practice makes perfect! Build something with ${topic} today.</div>`;
        }
        htmlLessons.push({ content, time });
    }

    const learningTopics = [
        { id: 1, title: "HTML Mastery", icon: "fa-code", desc: "50 comprehensive lessons from basics to advanced", color: "#6366f1", status: "available", isNew: true },
        { id: 2, title: "CSS Wizardry", icon: "fa-palette", desc: "Transform designs into stunning reality", color: "#d946ef", status: "coming-soon", isNew: false },
        { id: 3, title: "JavaScript Alchemy", icon: "fa-bolt", desc: "Bring interactivity and dynamic features", color: "#f59e0b", status: "coming-soon", isNew: false },
        { id: 4, title: "📧 Email Signup", icon: "fa-envelope", desc: "Get daily learning tips and updates", color: "#10b981", status: "available", isNew: true }
    ];

    const websiteClones = [
        { id: 1, name: "X (Twitter)", icon: "fa-brands fa-x-twitter", color: "#ffffff", desc: "Real-time social platform", status: "available" },
        { id: 2, name: "Instagram Pro", icon: "fa-brands fa-instagram", color: "#E4405F", desc: "Visual storytelling", status: "available" },
        { id: 3, name: "Spotify Premium", icon: "fa-brands fa-spotify", color: "#1DB954", desc: "Music streaming", status: "available" },
        { id: 4, name: "YouTube Studio", icon: "fa-brands fa-youtube", color: "#FF0000", desc: "Video platform", status: "available" },
        { id: 5, name: "Netflix Cinema", icon: "fa-brands fa-netflix", color: "#E50914", desc: "Cinematic experience", status: "available" },
        { id: 6, name: "Discord Hub", icon: "fa-brands fa-discord", color: "#5865F2", desc: "Community platform", status: "available" }
    ];

    let currentPage = 'start';
    let isLoggedIn = false;
    let activeModule = 'learn';
    let currentView = 'dashboard';
    let currentModalCode = '';
    let currentLessonPage = 1;

    function checkAutoLogin() {
        return localStorage.getItem('clonegpt_ultimate_logged_in') === 'true';
    }

    if (checkAutoLogin()) {
        isLoggedIn = true;
        currentPage = 'dashboard';
        currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        if (localStorage.getItem('html_course_completed') === 'true') {
            certificateTabVisible = true;
        }
    }

    function generateCloneCode(clone) {
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${clone.name}</title><style>body{font-family:system-ui;background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0;padding:20px}.card{background:rgba(255,255,255,0.95);backdrop-filter:blur(30px);border-radius:40px;padding:60px;text-align:center;max-width:500px;box-shadow:0 40px 80px rgba(0,0,0,0.3)}h1{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:20px;font-size:2.5rem}p{color:#4a5568;margin-bottom:30px;line-height:1.8}.btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:16px 36px;border-radius:50px;cursor:pointer;font-weight:700;transition:all 0.3s}.btn:hover{transform:translateY(-3px)scale(1.05);box-shadow:0 25px 60px rgba(99,102,241,0.6)}</style></head><body><div class="card"><h1>✨ ${clone.name} Clone ✨</h1><p>${clone.desc}</p><button class="btn" onclick="alert('🚀 Welcome to CLONEGPT!')">Launch →</button></div></body></html>`;
    }

    let autoEmailTriggered = false;
    function showAutoEmailSignup() {
        if (!autoEmailTriggered && currentPage === 'dashboard' && isLoggedIn && currentView === 'dashboard' && !localStorage.getItem('clonegpt_email_shown')) {
            autoEmailTriggered = true;
            setTimeout(() => {
                if (currentPage === 'dashboard' && isLoggedIn && currentView === 'dashboard' && !localStorage.getItem('clonegpt_email_shown')) {
                    currentView = 'email';
                    render();
                }
            }, 1000);
        }
    }

    function saveEmailAndSend(event) {
        event.preventDefault();
        const email = document.getElementById('userEmail')?.value;
        if (email && email.includes('@') && email.includes('.')) {
            localStorage.setItem('clonegpt_email_shown', 'true');
            alert('✅ Thanks for subscribing! You will receive daily tips.');
            currentView = 'dashboard';
            render();
        } else {
            alert('⚠️ Please enter a valid email address');
        }
    }

    function skipEmailForever() {
        localStorage.setItem('clonegpt_email_shown', 'true');
        currentView = 'dashboard';
        render();
    }

    function showComingSoon(itemName) {
        document.getElementById('comingSoonTitle').textContent = `✨ ${itemName} ✨`;
        document.getElementById('comingSoonItem').textContent = itemName;
        document.getElementById('comingSoonModal').classList.add('active');
    }

    function closeComingSoonModal() {
        document.getElementById('comingSoonModal')?.classList.remove('active');
    }

    function notifyMe() {
        alert('🎉 Thanks! You\'ll be notified when this launches! 🚀');
        closeComingSoonModal();
    }

    function startHTMLLesson() {
        currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        currentView = 'lesson';
        render();
    }

    function nextLesson() {
        if (currentLessonPage < 50) {
            currentLessonPage++;
            localStorage.setItem('html_current_lesson', currentLessonPage);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            checkAndIssueHTMLCertificate();
        }
    }

    function prevLesson() {
        if (currentLessonPage > 1) {
            currentLessonPage--;
            localStorage.setItem('html_current_lesson', currentLessonPage);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function backToDashboard() {
        currentView = 'dashboard';
        render();
    }

    function showEmailSignup() {
        if (!localStorage.getItem('clonegpt_email_shown')) {
            currentView = 'email';
            render();
        } else {
            alert('You have already subscribed! Thank you 🙏');
        }
    }

    function renderCertificatesTab() {
        certificates = JSON.parse(localStorage.getItem('clonegpt_certificates')) || [];
        
        if (certificates.length === 0) {
            return `
                <div class="empty-certificates">
                    <i class="fas fa-certificate"></i>
                    <h3>No Certificates Yet</h3>
                    <p>Complete a course to earn your first <strong style="color:#ffd700;">CLONEGPT Certificate</strong>!</p>
                    <p style="margin-top: 20px;">✨ Complete the <strong>HTML Mastery Course</strong> (50 lessons) to get your certificate ✨</p>
                    <button class="hero-btn" style="margin-top: 30px; padding: 12px 30px; font-size: 1rem;" onclick="startHTMLLesson()">
                        <i class="fas fa-code"></i> Start HTML Course
                    </button>
                </div>
            `;
        } else {
            let certsHtml = '<div class="certificate-list">';
            certificates.forEach(cert => {
                certsHtml += `
                    <div class="certificate-card-item">
                        <div class="info">
                            <h4><i class="fas fa-certificate" style="color: #ffd700;"></i> ${cert.courseName}</h4>
                            <p><i class="fas fa-user"></i> ${cert.studentName} &nbsp;|&nbsp; <i class="fas fa-calendar"></i> ${cert.completionDate} &nbsp;|&nbsp; <i class="fas fa-check-circle"></i> ${cert.lessonsCompleted} lessons</p>
                        </div>
                        <button class="view-cert-btn" onclick="showExistingCertificate(${cert.id})">
                            <i class="fas fa-eye"></i> View Certificate
                        </button>
                    </div>
                `;
            });
            certsHtml += '</div>';
            return certsHtml;
        }
    }

    function showExistingCertificate(certId) {
        const cert = certificates.find(c => c.id === certId);
        if (cert) {
            showCertificatePopup(cert);
        }
    }

    function runCompiler() {
        const html = document.getElementById('htmlCode')?.value || '';
        const css = document.getElementById('cssCode')?.value || '';
        const js = document.getElementById('jsCode')?.value || '';
        const previewFrame = document.getElementById('previewFrame');
        if (previewFrame) {
            previewFrame.srcdoc = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
        }
    }

    function render() {
        const root = document.getElementById('root');
        
        if (currentPage === 'start') {
            autoEmailTriggered = false;
            root.innerHTML = `
                <div class="start-page">
                    <div class="hero-content">
                        <span class="hero-badge"><i class="fas fa-crown"></i> CLONEGPT ULTIMATE • EARN CERTIFICATES <i class="fas fa-crown"></i></span>
                        <h1 class="hero-title">Master Web Development<br>with CLONEGPT</h1>
                        <p class="hero-subtitle">Premium clones • 50 comprehensive lessons • Live compiler<br>Earn official CLONEGPT certificates upon completion!</p>
                        <div class="stats-row">
                            <div class="stat"><span class="stat-number">20+</span><span class="stat-label">Premium Clones</span></div>
                            <div class="stat"><span class="stat-number">50</span><span class="stat-label">HD Lessons</span></div>
                            <div class="stat"><span class="stat-number">Live</span><span class="stat-label">Compiler</span></div>
                        </div>
                        <button class="hero-btn" onclick="goToLogin()">Begin Your Journey <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
            `;
        } else if (currentPage === 'login') {
            root.innerHTML = `
                <div class="login-page">
                    <div class="login-container">
                        <div class="login-header">
                            <div class="login-icon"><i class="fas fa-crown"></i></div>
                            <h2>Welcome to CLONEGPT</h2>
                            <p>Enter your name for your certificate</p>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Your Name (will appear on certificate)</label>
                            <div class="input-field">
                                <i class="fas fa-user"></i>
                                <input type="text" id="loginUsername" placeholder="Enter your full name" value="Elite Developer">
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Password (demo: any)</label>
                            <div class="input-field">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="loginPassword" placeholder="Enter any password" value="clonegpt">
                            </div>
                        </div>
                        <button class="login-submit" onclick="handleLogin()">Enter Dashboard →</button>
                        <div class="login-footer"><i class="fas fa-certificate"></i> Complete courses to earn CLONEGPT certificates</div>
                    </div>
                </div>
            `;
        } else if (currentPage === 'dashboard' && isLoggedIn) {
            if (currentView === 'lesson') {
                const lesson = htmlLessons[currentLessonPage - 1];
                const progressPercent = (currentLessonPage / 50) * 100;
                root.innerHTML = `
                    <div class="dashboard">
                        <nav class="navbar">
                            <div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CLONEGPT Ultimate</span></div>
                            <button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
                        </nav>
                        <div class="lesson-container">
                            <button class="back-to-dashboard" onclick="backToDashboard()"><i class="fas fa-arrow-left"></i> Dashboard</button>
                            <div class="lesson-header">
                                <div class="lesson-meta">
                                    <div class="lesson-progress"><i class="fas fa-graduation-cap"></i> Lesson ${currentLessonPage} of 50</div>
                                    <div class="lesson-time"><i class="far fa-clock"></i> ~${lesson.time} read</div>
                                </div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                            </div>
                            <div class="lesson-content"><div class="lesson-text">${lesson.content}</div></div>
                            <div class="lesson-navigation">
                                <button class="nav-btn" onclick="prevLesson()" ${currentLessonPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Previous</button>
                                <button class="nav-btn primary" onclick="nextLesson()" ${currentLessonPage === 50 ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentView === 'email') {
                if (localStorage.getItem('clonegpt_email_shown')) {
                    currentView = 'dashboard';
                    render();
                    return;
                }
                root.innerHTML = `
                    <div class="dashboard">
                        <nav class="navbar">
                            <div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CLONEGPT Ultimate</span></div>
                            <button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
                        </nav>
                        <div class="email-section">
                            <div class="email-card">
                                <div class="email-icon"><i class="fas fa-paper-plane"></i></div>
                                <h2>Get Daily Learning Tips!</h2>
                                <p>Enter your email to receive web development tips and exclusive content.</p>
                                <form onsubmit="saveEmailAndSend(event)">
                                    <div class="email-input-wrapper">
                                        <i class="fas fa-envelope"></i>
                                        <input type="email" id="userEmail" placeholder="your@email.com" required>
                                    </div>
                                    <div class="email-action-buttons">
                                        <button type="submit" class="email-done-btn"><i class="fas fa-check"></i> Subscribe</button>
                                        <button type="button" class="email-skip-btn" onclick="skipEmailForever()"><i class="fas fa-times"></i> Skip</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                let topicsHtml = '';
                learningTopics.forEach(topic => {
                    if (topic.status === 'coming-soon') {
                        topicsHtml += `<div class="card disabled" onclick="showComingSoon('${topic.title}')"><div class="coming-soon-badge"><i class="fas fa-clock"></i> Coming Soon</div><div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-rocket"></i> Coming Soon</span></div></div>`;
                    } else {
                        if (topic.id === 4) {
                            topicsHtml += `<div class="card" onclick="showEmailSignup()">${topic.isNew ? '<div class="new-badge"><i class="fas fa-star"></i> NEW</div>' : ''}<div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-envelope"></i> Subscribe</span></div></div>`;
                        } else {
                            topicsHtml += `<div class="card" onclick="startHTMLLesson()">${topic.isNew ? '<div class="new-badge"><i class="fas fa-star"></i> JUST RELEASED</div>' : ''}<div class="card-icon"><i class="fas ${topic.icon}" style="color: ${topic.color};"></i></div><div class="card-content"><h3>${topic.title}</h3><p>${topic.desc}</p><span class="card-tag"><i class="fas fa-check-circle" style="color: #10b981;"></i> 50 Lessons</span></div></div>`;
                        }
                    }
                });
                
                let clonesHtml = '';
                websiteClones.forEach(clone => {
                    clonesHtml += `<div class="card" onclick="showCloneModal(${clone.id})"><div class="card-icon"><i class="${clone.icon}" style="color: ${clone.color};"></i></div><div class="card-content"><h3>${clone.name}</h3><p>${clone.desc}</p><span class="card-tag"><i class="fas fa-bolt"></i> Deploy</span></div></div>`;
                });
                
                const certificatesHtml = renderCertificatesTab();
                const certTabClass = certificateTabVisible ? '' : 'hidden-tab';
                
                root.innerHTML = `
                    <div class="dashboard">
                        <nav class="navbar">
                            <div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CLONEGPT Ultimate</span></div>
                            <button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
                        </nav>
                        <div class="tabs-wrapper">
                            <div class="tabs">
                                <button class="tab ${activeModule === 'learn' ? 'active' : ''}" onclick="switchModule('learn')"><i class="fas fa-graduation-cap"></i> Learn</button>
                                <button class="tab ${activeModule === 'compiler' ? 'active' : ''}" onclick="switchModule('compiler')"><i class="fas fa-code"></i> Compiler</button>
                                <button class="tab ${activeModule === 'clones' ? 'active' : ''}" onclick="switchModule('clones')"><i class="fas fa-clone"></i> Clones</button>
                                <button id="certificatesTab" class="tab certificate-tab ${activeModule === 'certificates' ? 'active' : ''} ${certTabClass}" onclick="switchModule('certificates')"><i class="fas fa-certificate"></i> Certificates 🎓</button>
                            </div>
                        </div>
                        <div class="content-area">
                            <div id="learnSection" style="display: ${activeModule === 'learn' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-graduation-cap"></i> Learning Hub</h2><p>Complete courses and earn CLONEGPT certificates</p></div>
                                <div class="cards-grid">${topicsHtml}</div>
                            </div>
                            <div id="compilerSection" style="display: ${activeModule === 'compiler' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-code"></i> Live Compiler</h2><p>Write • Preview • Perfect</p></div>
                                <div class="compiler-container">
                                    <div class="compiler-tabs">
                                        <button class="compiler-tab active" onclick="switchCompilerTab('html', this)">HTML</button>
                                        <button class="compiler-tab" onclick="switchCompilerTab('css', this)">CSS</button>
                                        <button class="compiler-tab" onclick="switchCompilerTab('js', this)">JavaScript</button>
                                    </div>
                                    <div id="compilerHtml" class="compiler-panel active"><textarea id="htmlCode" class="code-textarea" placeholder="Write HTML here..."><div style="text-align:center;padding:50px;"><h1>✨ CLONEGPT Ultimate ✨</h1><p>Build something amazing!</p><button id="demoBtn">Click Me</button></div></textarea></div>
                                    <div id="compilerCss" class="compiler-panel"><textarea id="cssCode" class="code-textarea" placeholder="Write CSS here...">body{font-family:system-ui;background:linear-gradient(135deg,#6366f1,#8b5cf6);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0}div{background:white;border-radius:30px;padding:40px;text-align:center}button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:12px 28px;border-radius:50px;cursor:pointer;margin-top:20px}</textarea></div>
                                    <div id="compilerJs" class="compiler-panel"><textarea id="jsCode" class="code-textarea" placeholder="Write JavaScript here...">document.getElementById('demoBtn').onclick=function(){alert('🚀 Welcome to CLONEGPT!')};</textarea></div>
                                    <button class="run-button" onclick="runCompiler()"><i class="fas fa-play"></i> Run Code</button>
                                    <iframe id="previewFrame" class="preview-frame"></iframe>
                                </div>
                            </div>
                            <div id="clonesSection" style="display: ${activeModule === 'clones' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-crown"></i> Premium Clones</h2><p>Professional-grade website clones</p></div>
                                <div class="cards-grid">${clonesHtml}</div>
                            </div>
                            <div id="certificatesSection" style="display: ${activeModule === 'certificates' ? 'block' : 'none'}">
                                <div class="section-header"><h2><i class="fas fa-certificate"></i> My Certificates</h2><p>Your CLONEGPT achievements</p></div>
                                ${certificatesHtml}
                            </div>
                        </div>
                    </div>
                    <div id="globalModal" class="modal">
                        <div class="modal-window">
                            <div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                            <div class="modal-body">
                                <div class="modal-actions">
                                    <button class="modal-btn modal-btn-run" onclick="runModalPreview()"><i class="fas fa-play"></i> Preview</button>
                                    <button class="modal-btn modal-btn-copy" onclick="copyModalCode()"><i class="fas fa-copy"></i> Copy Code</button>
                                </div>
                                <pre id="modalCodeBlock" class="code-block"></pre>
                                <div id="modalPreviewContainer" class="preview-block"></div>
                            </div>
                        </div>
                    </div>
                    <div id="comingSoonModal" class="modal coming-soon-modal">
                        <div class="modal-window">
                            <div class="modal-header"><h3><i class="fas fa-rocket"></i> Coming Soon</h3><button class="modal-close" onclick="closeComingSoonModal()"><i class="fas fa-times"></i></button></div>
                            <div class="modal-body" style="text-align: center;">
                                <div class="coming-soon-icon">🚀</div>
                                <h2 class="coming-soon-title" id="comingSoonTitle"></h2>
                                <p class="coming-soon-text"><strong id="comingSoonItem"></strong> is under development</p>
                                <div class="coming-soon-progress"><div class="coming-soon-progress-bar"></div></div>
                                <button class="notify-btn" onclick="notifyMe()"><i class="fas fa-bell"></i> Get Notified</button>
                            </div>
                        </div>
                    </div>
                `;
                setTimeout(() => { 
                    if (activeModule === 'compiler') runCompiler(); 
                }, 100);
                showAutoEmailSignup();
            }
        }
    }

    // Global functions
    window.goToLogin = () => { currentPage = 'login'; render(); };
    
    window.handleLogin = () => { 
        const username = document.getElementById('loginUsername')?.value || 'Elite Developer';
        localStorage.setItem('student_name', username);
        isLoggedIn = true; 
        currentPage = 'dashboard'; 
        currentView = 'dashboard'; 
        activeModule = 'learn'; 
        autoEmailTriggered = false;
        currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        localStorage.setItem('clonegpt_ultimate_logged_in', 'true'); 
        
        if (localStorage.getItem('html_course_completed') === 'true') {
            certificateTabVisible = true;
        }
        
        render(); 
    };
    
    window.logout = () => { 
        isLoggedIn = false; 
        currentPage = 'start'; 
        autoEmailTriggered = false;
        localStorage.removeItem('clonegpt_ultimate_logged_in'); 
        render(); 
    };
    
    window.switchModule = (module) => { 
        activeModule = module; 
        currentView = 'dashboard'; 
        render();
        if (module === 'compiler') setTimeout(() => runCompiler(), 100);
    };
    
    window.switchCompilerTab = (type, btn) => {
        document.querySelectorAll('.compiler-tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        ['Html', 'Css', 'Js'].forEach(t => document.getElementById(`compiler${t}`)?.classList.remove('active'));
        document.getElementById(`compiler${type.charAt(0).toUpperCase() + type.slice(1)}`)?.classList.add('active');
    };
    
    window.runCompiler = runCompiler;
    
    window.showCloneModal = (cloneId) => {
        const clone = websiteClones.find(c => c.id === cloneId);
        currentModalCode = generateCloneCode(clone);
        document.getElementById('modalTitle').innerHTML = `<i class="${clone.icon}"></i> ${clone.name}`;
        document.getElementById('modalCodeBlock').textContent = currentModalCode;
        document.getElementById('modalPreviewContainer').innerHTML = '';
        document.getElementById('globalModal').classList.add('active');
    };
    
    window.runModalPreview = () => {
        const iframe = document.createElement('iframe');
        iframe.className = 'preview-iframe';
        iframe.srcdoc = currentModalCode;
        const container = document.getElementById('modalPreviewContainer');
        container.innerHTML = '';
        container.appendChild(iframe);
    };
    
    window.copyModalCode = async () => {
        try { await navigator.clipboard.writeText(currentModalCode); alert('✅ Code copied!'); }
        catch { alert('📋 Copy manually'); }
    };
    
    window.closeModal = () => document.getElementById('globalModal')?.classList.remove('active');
    window.saveEmailAndSend = saveEmailAndSend;
    window.skipEmailForever = skipEmailForever;
    window.showEmailSignup = showEmailSignup;
    window.startHTMLLesson = startHTMLLesson;
    window.nextLesson = nextLesson;
    window.prevLesson = prevLesson;
    window.backToDashboard = backToDashboard;
    window.showExistingCertificate = showExistingCertificate;
    window.downloadCertificate = downloadCertificate;
    window.printCertificate = printCertificate;
    window.closeCertificateViewModal = closeCertificateViewModal;
    window.showComingSoon = showComingSoon;
    window.closeComingSoonModal = closeComingSoonModal;
    window.notifyMe = notifyMe;

    // Initial check
    if (checkAutoLogin()) {
        const savedLesson = localStorage.getItem('html_current_lesson');
        if (savedLesson) currentLessonPage = parseInt(savedLesson);
        if (localStorage.getItem('html_course_completed') === 'true') {
            certificateTabVisible = true;
        }
        checkAndIssueHTMLCertificate();
    }

    render();
</script>
</body>
</html>
