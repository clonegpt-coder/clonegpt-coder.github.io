    // 50 Detailed Lessons
    const htmlLessons = Array(50).fill(null).map((_, i) => {
        if(i === 0) return { time: "8 min", content: `<h2>📖 Lesson 1: HTML Kya Hai? (Introduction)</h2><p>HTML ka full form hai <strong>HyperText Markup Language</strong>. Yeh ek language hai jo browsers ko batati hai ki webpage pe kya dikhana hai.</p><h3>🌐 Web kaise kaam karta hai?</h3><p>Jab aap koi website open karte ho, toh aapka browser server se ek file maangta hai. Wo file HTML mein hoti hai. Browser us HTML ko padhta hai aur aapko sundar webpage dikhata hai.</p><div class="tip-box"><strong>💡 Pro Tip:</strong> HTML seekhna sab se pehla step hai web development ka!</div><div class="success-box"><strong>✅ Yaad rakho:</strong> HTML koi programming language nahi hai — yeh ek markup language hai.</div>` };
        if(i === 49) return { time: "15 min", content: `<h2>🎓 Lesson 50: Congratulations!</h2><p>🎉 Mubarak ho! Tumne HTML Mastery Course complete kar liya! Ab tum professional websites bana sakte ho.</p><div class="success-box"><strong>🏆 CERTIFICATE:</strong> Tumhara CLONEGPT HTML Mastery Certificate ab tayaar hai!</div>` };
        return { time: `${8 + (i%5)} min`, content: `<h2>📖 Lesson ${i+1}: HTML Mastery</h2><p>This is lesson ${i+1}. Keep practicing and you'll become a web development master!</p><div class="tip-box"><strong>💡 Tip:</strong> Practice makes perfect. Code along with every lesson!</div><pre><code>&lt;h1&gt;Learning Lesson ${i+1}&lt;/h1&gt;\n&lt;p&gt;HTML is awesome!&lt;/p&gt;</code></pre><div class="success-box"><strong>✅ Progress:</strong> You're getting closer to your certificate!</div>` };
    });
    
    const learningTopics = [
        { id: 1, title: "html_mastery", icon: "fa-code", desc: "html_desc", color: "#6366f1", status: "available", isNew: true },
        { id: 2, title: "css_wizardry", icon: "fa-palette", desc: "css_desc", color: "#d946ef", status: "coming-soon", isNew: false },
        { id: 3, title: "js_alchemy", icon: "fa-bolt", desc: "js_desc", color: "#f59e0b", status: "coming-soon", isNew: false },
        { id: 4, title: "email_signup", icon: "fa-envelope", desc: "email_desc", color: "#10b981", status: "available", isNew: true }
    ];
    
    const websiteClones = [
        { id: 1, name: "X (Twitter)", icon: "fa-brands fa-x-twitter", color: "#ffffff", desc: "Real-time social platform", status: "available" },
        { id: 2, name: "Instagram Pro", icon: "fa-brands fa-instagram", color: "#E4405F", desc: "Visual storytelling", status: "available" },
        { id: 3, name: "Spotify Premium", icon: "fa-brands fa-spotify", color: "#1DB954", desc: "Music streaming", status: "available" },
        { id: 4, name: "YouTube Studio", icon: "fa-brands fa-youtube", color: "#FF0000", desc: "Video platform", status: "available" },
        { id: 5, name: "Netflix Cinema", icon: "fa-brands fa-netflix", color: "#E50914", desc: "Cinematic experience", status: "available" },
        { id: 6, name: "Discord Hub", icon: "fa-brands fa-discord", color: "#5865F2", desc: "Community platform", status: "available" }
    ];
    
    function generateCloneCode(clone) {
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${clone.name} Clone</title><style>body{font-family:system-ui;background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0;padding:20px}.card{background:rgba(255,255,255,0.95);border-radius:40px;padding:60px;text-align:center;max-width:500px;box-shadow:0 40px 80px rgba(0,0,0,0.3)}h1{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;}button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:16px 36px;border-radius:50px;cursor:pointer;}</style></head><body><div class="card"><h1>✨ ${clone.name} Clone ✨</h1><p>${clone.desc}</p><button onclick="alert('Welcome to CLONEGPT')">Launch →</button></div></body></html>`;
    }
    
    function issueCertificate(courseId, courseName, lessonsCompleted) {
        const studentName = localStorage.getItem('student_name') || 'Elite Developer';
        const alreadyHasCert = certificates.some(c => c.courseId === courseId);
        if (!alreadyHasCert) {
            const certificate = {
                id: Date.now(),
                courseId: courseId,
                courseName: courseName,
                studentName: studentName,
                completionDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                lessonsCompleted: lessonsCompleted
            };
            certificates.push(certificate);
            localStorage.setItem('clonegpt_certificates', JSON.stringify(certificates));
            return certificate;
        }
        return null;
    }
    
    function showCertificatePopup(certificate) {
        const modal = document.getElementById('certificateViewModal');
        const img = document.getElementById('certificateImage');
        const svgString = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'><rect width='800' height='600' fill='#1a1a2e'/><text x='400' y='150' font-size='36' fill='#ffd700' text-anchor='middle' font-family='monospace'>🎓 CLONEGPT CERTIFICATE 🎓</text><text x='400' y='250' font-size='28' fill='#ffffff' text-anchor='middle'>This is to certify that</text><text x='400' y='320' font-size='34' fill='#a78bfa' text-anchor='middle' font-weight='bold'>${certificate.studentName}</text><text x='400' y='400' font-size='28' fill='#ffffff' text-anchor='middle'>has successfully completed the course</text><text x='400' y='480' font-size='32' fill='#f0abfc' text-anchor='middle' font-weight='bold'>${certificate.courseName}</text><text x='400' y='550' font-size='18' fill='#8a8a9a' text-anchor='middle'>${certificate.completionDate}</text></svg>`;
        img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
        modal.classList.add('active');
    }
    
    function closeCertificateViewModal() { document.getElementById('certificateViewModal').classList.remove('active'); }
    function downloadCertificate() { const img = document.getElementById('certificateImage'); const link = document.createElement('a'); link.download = 'CLONEGPT_Certificate.png'; const canvas = document.createElement('canvas'); canvas.width = 800; canvas.height = 600; const ctx = canvas.getContext('2d'); const tempImg = new Image(); tempImg.src = img.src; tempImg.onload = () => { ctx.drawImage(tempImg, 0, 0, 800, 600); link.href = canvas.toDataURL(); link.click(); }; }
    function printCertificate() { const imgSrc = document.getElementById('certificateImage').src; const win = window.open('', '_blank'); win.document.write(`<html><head><title>Certificate</title><style>body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}img{max-width:100%}</style></head><body><img src="${imgSrc}"></body></html>`); win.document.close(); win.print(); }
    
    function checkAndIssueHTMLCertificate() {
        const htmlCompleted = localStorage.getItem('html_course_completed') === 'true';
        const currentLesson = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        if (currentLesson === 50 && !htmlCompleted) {
            localStorage.setItem('html_course_completed', 'true');
            const certificate = issueCertificate('html_mastery', 'HTML Mastery Course', 50);
            if (certificate) {
                certificateTabVisible = true;
                const certTab = document.getElementById('certificatesTab');
                if (certTab) certTab.classList.remove('hidden-tab');
                setTimeout(() => showCertificatePopup(certificate), 500);
            }
        }
    }
    
    function startHTMLLesson() { currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1; currentView = 'lesson'; renderLessonContent(); }
    function nextLesson() { if (currentLessonPage < 50) { currentLessonPage++; localStorage.setItem('html_current_lesson', currentLessonPage); renderLessonContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); checkAndIssueHTMLCertificate(); } }
    function prevLesson() { if (currentLessonPage > 1) { currentLessonPage--; localStorage.setItem('html_current_lesson', currentLessonPage); renderLessonContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }
    function backToDashboard() { currentView = 'dashboard'; render(); }
    function showComingSoon(itemName) { document.getElementById('comingSoonTitle').textContent = `✨ ${translate(itemName.toLowerCase().replace(/ /g,'_'), 'english') || itemName} ✨`; document.getElementById('comingSoonItem').textContent = itemName; document.getElementById('comingSoonModal').classList.add('active'); }
    function closeComingSoonModal() { document.getElementById('comingSoonModal')?.classList.remove('active'); }
    function notifyMe() { alert(translate('notify', currentLanguage) || '🎉 Thanks! You will be notified!'); closeComingSoonModal(); }
    function showEmailSignup() { if (!localStorage.getItem('clonegpt_email_shown')) { currentView = 'email'; render(); } else alert(translate('already_subscribed', currentLanguage) || 'Already subscribed!'); }
    function saveEmailAndSend(e) { e.preventDefault(); const email = document.getElementById('userEmail')?.value; if(email && email.includes('@')) { localStorage.setItem('clonegpt_email_shown', 'true'); alert(translate('subscribed', currentLanguage) || '✅ Subscribed!'); currentView = 'dashboard'; render(); } else alert(translate('valid_email', currentLanguage) || 'Valid email required'); }
    function skipEmailForever() { localStorage.setItem('clonegpt_email_shown', 'true'); currentView = 'dashboard'; render(); }
    function switchModule(module) { activeModule = module; currentView = 'dashboard'; render(); if(module === 'compiler') setTimeout(() => runCompiler(), 100); }
    function runCompiler() { const html = document.getElementById('htmlCode')?.value || ''; const css = document.getElementById('cssCode')?.value || ''; const js = document.getElementById('jsCode')?.value || ''; const preview = document.getElementById('previewFrame'); if(preview) preview.srcdoc = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`; }
    function switchCompilerTab(type, btn) { document.querySelectorAll('.compiler-tab').forEach(t => t.classList.remove('active')); if(btn) btn.classList.add('active'); ['Html', 'Css', 'Js'].forEach(t => document.getElementById(`compiler${t}`)?.classList.remove('active')); document.getElementById(`compiler${type.charAt(0).toUpperCase() + type.slice(1)}`)?.classList.add('active'); }
    function showCloneModal(cloneId) { const clone = websiteClones.find(c => c.id === cloneId); currentModalCode = generateCloneCode(clone); document.getElementById('modalTitle').innerHTML = `<i class="${clone.icon}"></i> ${clone.name}`; document.getElementById('modalCodeBlock').textContent = currentModalCode; document.getElementById('modalPreviewContainer').innerHTML = ''; document.getElementById('globalModal').classList.add('active'); }
    function runModalPreview() { const iframe = document.createElement('iframe'); iframe.className = 'preview-frame'; iframe.style.width = '100%'; iframe.style.height = '400px'; iframe.srcdoc = currentModalCode; document.getElementById('modalPreviewContainer').innerHTML = ''; document.getElementById('modalPreviewContainer').appendChild(iframe); }
    function copyModalCode() { navigator.clipboard.writeText(currentModalCode).then(()=>alert('Copied!')).catch(()=>alert('Manual copy')); }
    function closeModal() { document.getElementById('globalModal')?.classList.remove('active'); }
    function goToLogin() { currentPage = 'login'; render(); }
    function handleLogin() { const username = document.getElementById('loginUsername')?.value || 'Elite Developer'; localStorage.setItem('student_name', username); isLoggedIn = true; currentPage = 'dashboard'; currentView = 'dashboard'; activeModule = 'learn'; localStorage.setItem('clonegpt_ultimate_logged_in', 'true'); currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1; if(localStorage.getItem('html_course_completed') === 'true') certificateTabVisible = true; render(); }
    function logout() { isLoggedIn = false; currentPage = 'start'; localStorage.removeItem('clonegpt_ultimate_logged_in'); render(); }
    
    function renderCertificatesTab() {
        certificates = JSON.parse(localStorage.getItem('clonegpt_certificates')) || [];
        if(certificates.length === 0) return `<div class="empty-certificates"><i class="fas fa-certificate"></i><h3>${translate('no_certificates')}</h3><p>${translate('complete_html')}</p><button class="hero-btn" style="margin-top:30px;padding:12px 30px;" onclick="startHTMLLesson()"><i class="fas fa-code"></i> ${translate('start_course')}</button></div>`;
        let html = '<div class="certificate-list">';
        certificates.forEach(cert => { html += `<div class="certificate-card-item"><div class="info"><h4><i class="fas fa-certificate"></i> ${cert.courseName}</h4><p><i class="fas fa-user"></i> ${cert.studentName} &nbsp;|&nbsp; <i class="fas fa-calendar"></i> ${cert.completionDate}</p></div><button class="view-cert-btn" onclick="showExistingCertificate(${cert.id})"><i class="fas fa-eye"></i> ${translate('view', currentLanguage) || 'View'}</button></div>`; });
        html += '</div>'; return html;
    }
    function showExistingCertificate(certId) { const cert = certificates.find(c => c.id === certId); if(cert) showCertificatePopup(cert); }
    
    function render() {
        const root = document.getElementById('root');
        if(!root) return;
        if(currentPage === 'start') {
            root.innerHTML = `<div class="start-page"><div class="hero-content"><span class="hero-badge"><i class="fas fa-crown"></i> CLONEGPT ULTIMATE</span><h1 class="hero-title">Master Web Development<br>with CLONEGPT</h1><p class="hero-subtitle">Premium clones • 50 lessons • Live compiler • Earn certificates</p><div class="stats-row"><div class="stat"><span class="stat-number">20+</span><span class="stat-label">Clones</span></div><div class="stat"><span class="stat-number">50</span><span class="stat-label">Lessons</span></div><div class="stat"><span class="stat-number">Live</span><span class="stat-label">Compiler</span></div></div><button class="hero-btn" onclick="goToLogin()">Begin Journey <i class="fas fa-arrow-right"></i></button></div></div>`;
        } 
        else if(currentPage === 'login') {
            root.innerHTML = `<div class="login-page"><div class="login-container"><div class="login-icon"><i class="fas fa-crown"></i></div><h2 style="text-align:center;">Welcome to CLONEGPT</h2><p style="text-align:center;">Enter your name for certificate</p><div class="input-group"><label class="input-label">Your Full Name</label><div class="input-field"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="Enter your name" value="Elite Developer"></div></div><button class="login-submit" onclick="handleLogin()">Enter Dashboard →</button></div></div>`;
        }
        else if(currentPage === 'dashboard' && isLoggedIn) {
            if(currentView === 'email') {
                root.innerHTML = `<div class="dashboard"><nav class="navbar"><div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CLONEGPT</span></div><button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ${translate('exit')}</button></nav><div class="email-section"><div class="email-card"><div class="email-icon"><i class="fas fa-paper-plane"></i></div><h2>${translate('email_signup')}</h2><p>${translate('email_desc')}</p><form onsubmit="saveEmailAndSend(event)"><div class="email-input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="userEmail" placeholder="your@email.com" required></div><div class="email-action-buttons"><button type="submit" class="email-done-btn"><i class="fas fa-check"></i> ${translate('subscribe')}</button><button type="button" class="email-skip-btn" onclick="skipEmailForever()">Skip</button></div></form></div></div></div>`;
            } else if(currentView !== 'lesson') {
                const topicsHtml = learningTopics.map(t => {
                    const titleKey = t.title;
                    const descKey = t.desc;
                    const title = translate(titleKey);
                    const desc = translate(descKey);
                    if(t.status === 'coming-soon') {
                        return `<div class="card disabled" onclick="showComingSoon('${title}')"><div class="coming-soon-badge">${translate('coming')}</div><div class="card-icon"><i class="fas ${t.icon}" style="color:${t.color}"></i></div><div class="card-content"><h3>${title}</h3><p>${desc}</p><span class="card-tag">🔜 ${translate('coming')}</span></div></div>`;
                    } else if(t.id === 4) {
                        return `<div class="card" onclick="showEmailSignup()"><div class="new-badge">NEW</div><div class="card-icon"><i class="fas ${t.icon}" style="color:${t.color}"></i></div><div class="card-content"><h3>${title}</h3><p>${desc}</p><span class="card-tag">📧 ${translate('subscribe')}</span></div></div>`;
                    } else {
                        return `<div class="card" onclick="startHTMLLesson()"><div class="new-badge">🔥 ${translate('available')}</div><div class="card-icon"><i class="fas ${t.icon}" style="color:${t.color}"></i></div><div class="card-content"><h3>${title}</h3><p>${desc}</p><span class="card-tag">✅ 50 ${translate('lesson')}</span></div></div>`;
                    }
                }).join('');
                const clonesHtml = websiteClones.map(c => `<div class="card" onclick="showCloneModal(${c.id})"><div class="card-icon"><i class="${c.icon}" style="color:${c.color}"></i></div><div class="card-content"><h3>${c.name}</h3><p>${c.desc}</p><span class="card-tag">🚀 ${translate('clone')}</span></div></div>`).join('');
                const certsHtml = renderCertificatesTab();
                const certTabHidden = certificateTabVisible ? '' : 'hidden-tab';
                root.innerHTML = `<div class="dashboard"><nav class="navbar"><div class="logo"><div class="logo-icon"><i class="fas fa-cube"></i></div><span class="logo-text">CLONEGPT ULTIMATE</span></div><button class="logout-button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ${translate('exit')}</button></nav><div class="tabs-wrapper"><div class="tabs"><button class="tab ${activeModule==='learn'?'active':''}" onclick="switchModule('learn')"><i class="fas fa-graduation-cap"></i> ${translate('learn')}</button><button class="tab ${activeModule==='compiler'?'active':''}" onclick="switchModule('compiler')"><i class="fas fa-code"></i> ${translate('compiler')}</button><button class="tab ${activeModule==='clones'?'active':''}" onclick="switchModule('clones')"><i class="fas fa-clone"></i> ${translate('clones')}</button><button id="certificatesTab" class="tab certificate-tab ${activeModule==='certificates'?'active':''} ${certTabHidden}" onclick="switchModule('certificates')"><i class="fas fa-certificate"></i> ${translate('certificates')} 🎓</button></div></div><div class="content-area"><div id="learnSection" style="display:${activeModule==='learn'?'block':'none'}"><div class="section-header"><h2>📘 ${translate('learning_hub')}</h2><p>${translate('complete_courses')}</p></div><div class="cards-grid">${topicsHtml}</div></div><div id="compilerSection" style="display:${activeModule==='compiler'?'block':'none'}"><div class="section-header"><h2>⚡ ${translate('live_compiler')}</h2><p>${translate('write_preview')}</p></div><div class="compiler-container"><div class="compiler-tabs"><button class="compiler-tab active" onclick="switchCompilerTab('html', this)">HTML</button><button class="compiler-tab" onclick="switchCompilerTab('css', this)">CSS</button><button class="compiler-tab" onclick="switchCompilerTab('js', this)">JS</button></div><div id="compilerHtml" class="compiler-panel active"><textarea id="htmlCode" class="code-textarea"><div style="padding:40px;text-align:center"><h1>Hello CLONEGPT</h1><button id="clickBtn">Click Me</button></div></textarea></div><div id="compilerCss" class="compiler-panel"><textarea id="cssCode" class="code-textarea">body{font-family:sans-serif;background:#f0f0f0;} button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:12px 24px;border-radius:40px;cursor:pointer;}</textarea></div><div id="compilerJs" class="compiler-panel"><textarea id="jsCode" class="code-textarea">document.getElementById('clickBtn')?.addEventListener('click',()=>alert('🚀 Live Preview Working!'))</textarea></div><button class="run-button" onclick="runCompiler()"><i class="fas fa-play"></i> ${translate('run_code')}</button><iframe id="previewFrame" class="preview-frame"></iframe></div></div><div id="clonesSection" style="display:${activeModule==='clones'?'block':'none'}"><div class="section-header"><h2>🎨 ${translate('premium_clones')}</h2><p>${translate('professional_clones')}</p></div><div class="cards-grid">${clonesHtml}</div></div><div id="certificatesSection" style="display:${activeModule==='certificates'?'block':'none'}"><div class="section-header"><h2>🏆 ${translate('my_certificates')}</h2><p>${translate('your_achievements')}</p></div>${certsHtml}</div></div></div>`;
                setTimeout(() => { if(activeModule === 'compiler') runCompiler(); }, 100);
            }
        }
    }
    
    // Expose functions globally
    window.goToLogin = goToLogin; window.handleLogin = handleLogin; window.logout = logout; window.switchModule = switchModule;
    window.switchCompilerTab = switchCompilerTab; window.runCompiler = runCompiler; window.showCloneModal = showCloneModal;
    window.runModalPreview = runModalPreview; window.copyModalCode = copyModalCode; window.closeModal = closeModal;
    window.startHTMLLesson = startHTMLLesson; window.nextLesson = nextLesson; window.prevLesson = prevLesson; window.backToDashboard = backToDashboard;
    window.showEmailSignup = showEmailSignup; window.saveEmailAndSend = saveEmailAndSend; window.skipEmailForever = skipEmailForever;
    window.showComingSoon = showComingSoon; window.closeComingSoonModal = closeComingSoonModal; window.notifyMe = notifyMe;
    window.showExistingCertificate = showExistingCertificate; window.downloadCertificate = downloadCertificate; window.printCertificate = printCertificate;
    window.closeCertificateViewModal = closeCertificateViewModal;
    window.changeLanguage = changeLanguage;
    
    if(localStorage.getItem('clonegpt_ultimate_logged_in') === 'true') {
        isLoggedIn = true; currentPage = 'dashboard'; currentLessonPage = parseInt(localStorage.getItem('html_current_lesson')) || 1;
        if(localStorage.getItem('html_course_completed') === 'true') certificateTabVisible = true;
        checkAndIssueHTMLCertificate();
    }
    render();
</script>

<!-- Modals -->
<div id="certificateViewModal" class="modal">
    <div class="modal-window">
        <div class="modal-header"><h3><i class="fas fa-certificate"></i> 🎓 Your Certificate</h3><button class="modal-close" onclick="closeCertificateViewModal()"><i class="fas fa-times"></i></button></div>
        <div class="modal-body"><img id="certificateImage" class="certificate-img" src=""><div class="modal-actions"><button class="modal-btn modal-btn-download" onclick="downloadCertificate()"><i class="fas fa-download"></i> Download</button><button class="modal-btn modal-btn-print" onclick="printCertificate()"><i class="fas fa-print"></i> Print</button></div></div>
    </div>
</div>
<div id="globalModal" class="modal">
    <div class="modal-window">
        <div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
        <div class="modal-body"><div class="modal-actions"><button class="modal-btn modal-btn-download" onclick="runModalPreview()"><i class="fas fa-play"></i> Preview</button><button class="modal-btn modal-btn-print" onclick="copyModalCode()"><i class="fas fa-copy"></i> Copy Code</button></div><pre id="modalCodeBlock" class="code-block" style="background:#0a0a0f;padding:1rem;border-radius:1rem;overflow-x:auto;"></pre><div id="modalPreviewContainer"></div></div>
    </div>
</div>
<div id="comingSoonModal" class="modal coming-soon-modal">
    <div class="modal-window"><div class="modal-header"><h3><i class="fas fa-rocket"></i> Coming Soon</h3><button class="modal-close" onclick="closeComingSoonModal()"><i class="fas fa-times"></i></button></div><div class="modal-body" style="text-align:center;"><div class="coming-soon-icon">🚀</div><h2 class="coming-soon-title" id="comingSoonTitle"></h2><p class="coming-soon-text"><strong id="comingSoonItem"></strong> is under development</p><div class="coming-soon-progress"><div class="coming-soon-progress-bar"></div></div><button class="notify-btn" onclick="notifyMe()"><i class="fas fa-bell"></i> Get Notified</button></div></div>
</div>
